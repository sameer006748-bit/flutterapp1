<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Klick Buy - Invoices</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-box">
        <div class="brand-badge">OK</div>
        <div>
          <div class="brand-title">One Klick Buy</div>
          <div class="brand-subtitle">ERP • POS • Delivery</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <a href="#" data-route="dashboard.html">📊 Dashboard</a>
        <a href="#" data-route="products.html">📦 Products</a>
        <a href="#" data-route="customers.html">👥 Customers</a>
        <a href="#" data-route="invoices.html" class="active">🧾 Invoices</a>
        <a href="#" data-route="orders.html">🛒 Orders</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Operations</div>
        <a href="#" data-route="inventory.html">🏬 Inventory</a>
        <a href="#" data-route="reports.html">📈 Reports</a>
        <a href="#" data-route="settings.html">⚙️ Settings</a>
        <a href="#" data-route="profile.html">👤 Profile</a>
      </div>
      <a href="#" id="logout-link" class="logout-link">🚪 Logout</a>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>Invoices</h1>
          <div class="muted">Create sales invoices, collect payments, assign riders, and print/download them.</div>
        </div>
        <div class="topbar-actions">
          <div class="search-box"><span>🔎</span><input type="text" placeholder="Search invoices ..." /></div>
        </div>
      </div>
      <div id="invoice-manager"></div>
    </main>
  </div>
  <script type="module">
    import { auth, onAuthStateChanged, signOut } from './js/firebase.js';
    import { initRouter } from './js/router.js';
    import { loadInvoiceManager } from './js/invoice-manager.js';
    initRouter();
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = './index.html';
        return;
      }
      await loadInvoiceManager('invoice-manager');
    });
    document.getElementById('logout-link').addEventListener('click', async (event) => {
      event.preventDefault();
      await signOut(auth);
      window.location.href = './index.html';
    });
  </script>
</body>
</html>
