<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Klick Buy - Add Product</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h3>One Klick Buy</h3>
      <a href="#" data-route="dashboard.html">Dashboard</a>
      <a href="#" data-route="products.html" class="active">Products</a>
      <a href="#" data-route="customers.html">Customers</a>
      <a href="#" data-route="invoices.html">Invoices</a>
      <a href="#" data-route="orders.html">Orders</a>
      <a href="#" data-route="inventory.html">Inventory</a>
      <a href="#" data-route="reports.html">Reports</a>
      <a href="#" data-route="settings.html">Settings</a>
      <a href="#" data-route="profile.html">Profile</a>
      <a href="#" id="logout-link">Logout</a>
    </aside>
    <main class="main">
      <div class="topbar"><h1>Add Product</h1></div>
      <div class="card">
        <form id="product-form">
          <div class="row">
            <input id="name" placeholder="Product name" required />
            <input id="category" placeholder="Category" required />
          </div>
          <div class="row">
            <input id="brand" placeholder="Brand" />
            <input id="color" placeholder="Color" />
          </div>
          <div class="row">
            <input id="size" placeholder="Size" />
            <input id="stock" type="number" placeholder="Stock" min="0" required />
          </div>
          <div class="row">
            <input id="costPrice" type="number" step="0.01" placeholder="Cost price" required />
            <input id="salePrice" type="number" step="0.01" placeholder="Sale price" required />
          </div>
          <input id="image" placeholder="Image URL" />
          <textarea id="description" placeholder="Description"></textarea>
          <button type="submit">Save Product</button>
        </form>
        <div id="product-error" class="error"></div>
      </div>
    </main>
  </div>
  <script type="module">
    import { auth, onAuthStateChanged, signOut } from './js/firebase.js';
    import { initRouter } from './js/router.js';
    import { saveProduct } from './js/products.js';
    initRouter();
    onAuthStateChanged(auth, (user) => { if (!user) { window.location.href = './index.html'; } });
    document.getElementById('product-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value.trim(),
        brand: document.getElementById('brand').value.trim(),
        color: document.getElementById('color').value.trim(),
        size: document.getElementById('size').value.trim(),
        stock: Number(document.getElementById('stock').value || 0),
        costPrice: Number(document.getElementById('costPrice').value || 0),
        salePrice: Number(document.getElementById('salePrice').value || 0),
        image: document.getElementById('image').value.trim(),
        description: document.getElementById('description').value.trim(),
        createdAt: new Date().toISOString()
      };
      try {
        await saveProduct(payload);
        window.location.href = './products.html';
      } catch (error) {
        document.getElementById('product-error').textContent = error.message;
      }
    });
    document.getElementById('logout-link').addEventListener('click', async (event) => { event.preventDefault(); await signOut(auth); window.location.href = './index.html'; });
  </script>
</body>
</html>
