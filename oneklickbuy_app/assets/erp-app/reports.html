<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Klick Buy - Reports</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h3>One Klick Buy</h3>
      <a href="#" data-route="dashboard.html">Dashboard</a>
      <a href="#" data-route="products.html">Products</a>
      <a href="#" data-route="customers.html">Customers</a>
      <a href="#" data-route="invoices.html">Invoices</a>
      <a href="#" data-route="orders.html">Orders</a>
      <a href="#" data-route="inventory.html">Inventory</a>
      <a href="#" data-route="reports.html" class="active">Reports</a>
      <a href="#" data-route="settings.html">Settings</a>
      <a href="#" data-route="profile.html">Profile</a>
      <a href="#" id="logout-link">Logout</a>
    </aside>
    <main class="main">
      <div class="topbar"><h1>Reports</h1></div>
      <div class="card"><p class="muted">Sales report, top products and top riders sections are ready for Firebase-backed reporting.</p></div>
      <div class="card">
        <h3>Operational summary</h3>
        <div id="reports-list"></div>
      </div>
    </main>
  </div>
  <script type="module">
    import { auth, onAuthStateChanged, signOut } from './js/firebase.js';
    import { initRouter } from './js/router.js';
    import { loadReports } from './js/reports.js';
    initRouter();
    onAuthStateChanged(auth, async (user) => { if (!user) { window.location.href = './index.html'; return; } await loadReports('reports-list'); });
    document.getElementById('logout-link').addEventListener('click', async (event) => { event.preventDefault(); await signOut(auth); window.location.href = './index.html'; });
  </script>
</body>
</html>
